---
- name: Download tre
  get_url:
    url: "https://github.com/dduan/tre/releases/download/{{ tre_version }}/tre-{{ tre_version }}-x86_64-unknown-linux-musl.tar.gz"
    dest: /tmp/tre.tar.gz

- name: Extract tre
  unarchive:
    src: /tmp/tre.tar.gz
    dest: /tmp
    remote_src: yes

- name: Install tre binary
  copy:
    src: "/tmp/tre"
    dest: "{{ install_dir }}/tre"
    mode: '0755'
    remote_src: yes

- name: Clean up tre
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/tre.tar.gz
    - /tmp/tre
    - /tmp/tre.1

- name: Verify tre installation
  command: "{{ install_dir }}/tre --version"
  register: tre_version_output
  changed_when: false

- name: Show tre version
  debug:
    msg: "{{ tre_version_output.stdout }}"
