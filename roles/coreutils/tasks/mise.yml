---
- name: Download mise binary
  get_url:
    url: "https://github.com/jdx/mise/releases/download/{{ mise_version }}/mise-{{ mise_version }}-linux-x64"
    dest: "{{ install_dir }}/mise"
    mode: '0755'

- name: Verify mise installation
  command: "{{ install_dir }}/mise --version"
  register: mise_version_output
  changed_when: false

- name: Show mise version
  debug:
    msg: "{{ mise_version_output.stdout }}"
