---
- name: Download bat
  get_url:
    url: "https://github.com/sharkdp/bat/releases/download/{{ bat_version }}/bat-{{ bat_version }}-x86_64-unknown-linux-gnu.tar.gz"
    dest: /tmp/bat.tar.gz

- name: Extract bat
  unarchive:
    src: /tmp/bat.tar.gz
    dest: /tmp
    remote_src: yes

- name: Install bat binary
  copy:
    src: "/tmp/bat-{{ bat_version }}-x86_64-unknown-linux-gnu/bat"
    dest: "{{ install_dir }}/bat"
    mode: '0755'
    remote_src: yes

- name: Clean up bat
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/bat.tar.gz
    - "/tmp/bat-{{ bat_version }}-x86_64-unknown-linux-gnu"

- name: Verify bat installation
  command: "{{ install_dir }}/bat --version"
  register: bat_version_output
  changed_when: false

- name: Show bat version
  debug:
    msg: "{{ bat_version_output.stdout }}"
