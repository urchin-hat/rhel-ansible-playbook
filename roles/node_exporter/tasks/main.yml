---
# ==============================================================================
# node_exporter 展開ロール (パッケージ管理版)
# ==============================================================================
# ターゲットサーバーのOSパッケージマネージャー (DNF) を利用して node_exporter を管理します。
# 外部からのバイナリダウンロードや手動配置は行いません。

- name: Ensure node_exporter package is installed (via OS repository)
  package:
    name: golang-github-prometheus-node-exporter
    state: present
  register: dnf_install_alternative
  ignore_errors: yes

- name: Try installing via alternative package name if previous failed
  package:
    name: node_exporter
    state: present
  when: dnf_install_alternative.failed is defined and dnf_install_alternative.failed
  ignore_errors: yes

- name: Ensure node_exporter service is enabled and started
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
  loop:
    - prometheus-node-exporter
    - node_exporter
  ignore_errors: yes

- name: Check firewalld status
  command: systemctl is-active firewalld
  register: firewalld_status
  changed_when: false
  failed_when: false

- name: Allow node_exporter port (9100/tcp) in firewalld
  command: "firewall-cmd --permanent --add-port=9100/tcp"
  when:
    - firewalld_status is defined
    - firewalld_status.rc == 0

- name: Reload firewalld to apply changes
  command: "firewall-cmd --reload"
  when:
    - firewalld_status is defined
    - firewalld_status.rc == 0
