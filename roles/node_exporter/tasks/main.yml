---
# ==============================================================================
# node_exporter 展開ロール
# ==============================================================================
# ターゲットサーバーのOSパッケージマネージャーを利用して node_exporter をインストールし、
# 起動状態とファイヤーウォール (9100/tcp) の開放を管理します。

- name: Ensure node_exporter package is installed (via OS repository)
  package:
    name: node_exporter
    state: present

- name: Ensure node_exporter service is enabled and started
  systemd:
    name: node_exporter
    enabled: yes
    state: started

- name: Check firewalld status
  command: systemctl is-active firewalld
  register: firewalld_status
  changed_when: false
  failed_when: false

- name: Allow node_exporter port (9100/tcp) in firewalld
  command: "firewall-cmd --permanent --add-port=9100/tcp"
  when:
    - firewalld_status is defined
    - firewalld_status.rc == 0

- name: Reload firewalld to apply changes
  command: "firewall-cmd --reload"
  when:
    - firewalld_status is defined
    - firewalld_status.rc == 0
