---
- name: Set normalized monitoring versions
  set_fact:
    prometheus_version_number: "{{ prometheus_version | regex_replace('^v', '') }}"
    node_exporter_version_number: "{{ node_exporter_version | regex_replace('^v', '') }}"

- name: Install required packages
  package:
    name:
      - tar
      - gzip
    state: present

- name: Install Grafana repository
  copy:
    src: grafana.repo
    dest: /etc/yum.repos.d/grafana.repo
    owner: root
    group: root
    mode: '0644'
  when: grafana_manage_repo

- name: Install Grafana
  package:
    name: "{{ grafana_package_name }}"
    state: present

- name: Create Prometheus group
  group:
    name: "{{ prometheus_group }}"
    system: yes

- name: Create Prometheus user
  user:
    name: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    system: yes
    shell: /sbin/nologin
    create_home: no

- name: Create node_exporter group
  group:
    name: "{{ node_exporter_group }}"
    system: yes

- name: Create node_exporter user
  user:
    name: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    system: yes
    shell: /sbin/nologin
    create_home: no

- name: Create Prometheus directories
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ prometheus_install_dir }}"
      owner: root
      group: root
      mode: '0755'
    - path: "{{ prometheus_config_dir }}"
      owner: root
      group: root
      mode: '0755'
    - path: "{{ prometheus_data_dir }}"
      owner: "{{ prometheus_user }}"
      group: "{{ prometheus_group }}"
      mode: '0755'

- name: Create node_exporter install directory
  file:
    path: "{{ node_exporter_install_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Download Prometheus
  get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version_number }}/prometheus-{{ prometheus_version_number }}.{{ monitoring_arch }}.tar.gz"
    dest: "/tmp/prometheus-{{ prometheus_version_number }}.{{ monitoring_arch }}.tar.gz"
    mode: '0644'

- name: Extract Prometheus
  unarchive:
    src: "/tmp/prometheus-{{ prometheus_version_number }}.{{ monitoring_arch }}.tar.gz"
    dest: /tmp
    remote_src: yes

- name: Install Prometheus binaries
  copy:
    src: "/tmp/prometheus-{{ prometheus_version_number }}.{{ monitoring_arch }}/{{ item }}"
    dest: "{{ prometheus_install_dir }}/{{ item }}"
    owner: root
    group: root
    mode: '0755'
    remote_src: yes
  loop:
    - prometheus
    - promtool
  notify: restart prometheus

- name: Download node_exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version_number }}/node_exporter-{{ node_exporter_version_number }}.{{ monitoring_arch }}.tar.gz"
    dest: "/tmp/node_exporter-{{ node_exporter_version_number }}.{{ monitoring_arch }}.tar.gz"
    mode: '0644'

- name: Extract node_exporter
  unarchive:
    src: "/tmp/node_exporter-{{ node_exporter_version_number }}.{{ monitoring_arch }}.tar.gz"
    dest: /tmp
    remote_src: yes

- name: Install node_exporter binary
  copy:
    src: "/tmp/node_exporter-{{ node_exporter_version_number }}.{{ monitoring_arch }}/node_exporter"
    dest: "{{ node_exporter_install_dir }}/node_exporter"
    owner: root
    group: root
    mode: '0755'
    remote_src: yes
  notify: restart node_exporter

- name: Configure Prometheus
  template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir }}/prometheus.yml"
    owner: root
    group: root
    mode: '0644'
  notify: restart prometheus

- name: Install Prometheus systemd unit
  template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
    owner: root
    group: root
    mode: '0644'
  notify: restart prometheus

- name: Install node_exporter systemd unit
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: '0644'
  notify: restart node_exporter

- name: Configure Grafana
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Create Grafana datasource provisioning directory
  file:
    path: /etc/grafana/provisioning/datasources
    state: directory
    owner: root
    group: grafana
    mode: '0755'

- name: Configure Grafana Prometheus datasource
  template:
    src: grafana-prometheus-datasource.yml.j2
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana

- name: Check SELinux status
  command: getenforce
  register: monitoring_selinux_status
  changed_when: false
  failed_when: false
  when: grafana_allow_network_connect_selinux

- name: Check Grafana datasource SELinux network permission
  command: getsebool httpd_can_network_connect
  register: monitoring_selinux_network_connect
  changed_when: false
  failed_when: false
  when:
    - grafana_allow_network_connect_selinux
    - monitoring_selinux_status is defined
    - monitoring_selinux_status.rc == 0
    - monitoring_selinux_status.stdout != "Disabled"

- name: Allow Grafana to query Prometheus on SELinux hosts
  command: setsebool -P httpd_can_network_connect on
  when:
    - grafana_allow_network_connect_selinux
    - monitoring_selinux_status is defined
    - monitoring_selinux_status.rc == 0
    - monitoring_selinux_status.stdout != "Disabled"
    - monitoring_selinux_network_connect is defined
    - monitoring_selinux_network_connect.rc == 0
    - "' --> on' not in monitoring_selinux_network_connect.stdout"

- name: Enable and start Prometheus services
  systemd:
    name: "{{ item }}"
    enabled: yes
    state: started
    daemon_reload: yes
  loop:
    - prometheus
    - node_exporter
    - grafana-server

- name: Check firewalld status
  command: systemctl is-active firewalld
  register: firewalld_status
  changed_when: false
  failed_when: false
  when: monitoring_configure_firewalld

- name: Check monitoring firewalld ports
  command: "firewall-cmd --query-port={{ item }}"
  register: monitoring_firewalld_port_checks
  changed_when: false
  failed_when: false
  loop: "{{ monitoring_firewalld_ports }}"
  when:
    - monitoring_configure_firewalld
    - firewalld_status is defined
    - firewalld_status.rc == 0

- name: Open monitoring firewalld ports
  command: "firewall-cmd --permanent --add-port={{ item.item }}"
  loop: "{{ monitoring_firewalld_port_checks.results | default([]) }}"
  when:
    - monitoring_configure_firewalld
    - firewalld_status is defined
    - firewalld_status.rc == 0
    - item.rc != 0
  notify: reload firewalld

- name: Clean up monitoring archives
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "/tmp/prometheus-{{ prometheus_version_number }}.{{ monitoring_arch }}.tar.gz"
    - "/tmp/prometheus-{{ prometheus_version_number }}.{{ monitoring_arch }}"
    - "/tmp/node_exporter-{{ node_exporter_version_number }}.{{ monitoring_arch }}.tar.gz"
    - "/tmp/node_exporter-{{ node_exporter_version_number }}.{{ monitoring_arch }}"
