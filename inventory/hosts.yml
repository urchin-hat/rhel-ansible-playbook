all:
  children:
    # --- リモート管理対象サーバー (ラズベリーパイ) ---
    rpis:
      hosts:
        fedora-pi:
          ansible_host: 192.168.1.151
        almalinux-pi:
          ansible_host: 192.168.1.152
      vars:
        ansible_user: ansible
        ansible_python_interpreter: /usr/bin/python3

    # --- 母艦サーバー自身 (ローカル実行用) ---
    local:
      hosts:
        localhost:
      vars:
        ansible_connection: local
        ansible_python_interpreter: /usr/bin/python3
